---
name: Форматирование строк
tips: []
definitions:
  - name: Шаблон
    description: >-
      строка с метками `%s`, на места которых подставляются значения.
  - name: String.format
    description: >-
      метод, который собирает строку из шаблона и значений, например
      `String.format("Привет, %s!", "Мир")` вернет `Привет, Мир!`.
