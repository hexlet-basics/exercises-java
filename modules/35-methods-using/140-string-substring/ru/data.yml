---
name: Подстрока
tips: []
definitions:
  - name: Подстрока
    description: часть строки, которая входит внутрь другой строки.
  - name: substring
    description: >-
      метод строки, который возвращает подстроку по индексам начала и конца.
      Символ с индексом начала входит в результат, символ с индексом конца не
      входит, например `"Hexlet".substring(0, 3)` вернет `Hex`.
