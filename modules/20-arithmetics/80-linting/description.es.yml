name: Linter
theory: |
  Ahora que ya hemos aprendido a escribir programas simples, podemos hablar un poco sobre cómo escribirlos.

  El código del programa debe formatearse de una manera específica para que sea lo suficientemente comprensible y fácil de mantener.

  Conjuntos especiales de reglas, llamados **estándares**, describen varios aspectos del formato del código. En Java, uno de los más extendidos es [Google Java Style](https://google.github.io/styleguide/javaguide.html).

  Vigilar el formato manualmente es incómodo, por eso se usan herramientas especiales. Los **linters** verifican que el código cumpla con el estándar e informan sobre las infracciones, mientras que los **formateadores** ajustan el código automáticamente al formato requerido. En Java existe [google-java-format](https://github.com/google/google-java-format), que formatea el código según el estándar de Google. Echa un vistazo a este ejemplo:

  ```java
  System.out.println( "Hello, World!" ); System.out.println("I'm a developer!") ;
  ```

  Aquí hay varias desviaciones del estándar:

  * espacios sobrantes dentro de los paréntesis: después de `(` y antes de `)`;
  * un espacio sobrante antes del punto y coma;
  * dos instrucciones escritas en una sola línea, aunque cada una debe ir en una línea nueva.

  El formateador corregirá el formato por sí mismo y dejará el código así:

  ```java
  System.out.println("Hello, World!");
  System.out.println("I'm a developer!");
  ```

  Cumplir con estas reglas no afecta el resultado del programa, pero hace que el código sea más comprensible y fácil de leer.

  ¿Qué conclusión podemos sacar? Un estándar de formato común y las herramientas que lo respaldan ayudan a escribir código más fácil de leer y analizar.

  Recuerda que un formateador no reemplaza el análisis y la simplificación independiente del código. En tus futuras prácticas en [Hexlet](https://ru.hexlet.io/?utm_source=code-basics&utm_medium=referral&utm_campaign=programs&utm_content=lesson) y en el desarrollo real, estas herramientas funcionarán y te informarán sobre cualquier infracción.

instructions: |

  Muestra en pantalla el resultado de la siguiente operación: "la diferencia entre la suma de cinco y dos y el producto de tres y siete". Compara el resultado obtenido con la solución del profesor en términos de formato del código.

