---
name: Логические выражения
tips:
  - >
    [Операторы и приоритет в
    Java](https://docs.oracle.com/javase/tutorial/java/nutsandbolts/operators.html)
definitions:
  - name: Составное логическое выражение
    description: >
      выражение из нескольких сравнений и логических операторов, которое
      вычисляется в одно значение true или false.
  - name: Сокращенное вычисление
    description: >
      пропуск правого операнда оператора, когда результат выражения уже
      определен левым операндом.
