---
name: Явное преобразование типов
tips:
  - |
    [Типизация](https://ru.wikipedia.org/wiki/Сильная_и_слабая_типизация)
definitions:
  - name: Приведение типов (casting)
    description: >-
      явное преобразование значения одного типа в значение другого типа.
      Например, `(int) 5.1` приводит рациональное число к целому.
